<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinthe</title>
<style>
body { margin: 0; }
canvas { display: block; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 17;
const ROWS = 23;
let TILE_SIZE;
let grid = [];

// --- GÉNÉRATION DU LABYRINTHE ---
function generateMaze(cols, rows) {
    let maze = Array.from({ length: rows }, () => Array(cols).fill(1));

    function walk(r, c) {
        maze[r][c] = 0;
        const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-0.5);

        for (let [dr, dc] of dirs) {
            let nr = r + dr, nc = c + dc;
            if (nr > 0 && nr < rows && nc > 0 && nc < cols && maze[nr][nc] === 1) {
                maze[r + dr/2][c + dc/2] = 0;
                walk(nr, nc);
            }
        }
    }

    walk(1,1);

    // casser des murs
    for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
            if (maze[r][c] === 1 && Math.random() < 0.3) {
                if ((maze[r][c-1] === 0 && maze[r][c+1] === 0) ||
                    (maze[r-1][c] === 0 && maze[r+1][c] === 0)) {
                    maze[r][c] = 0;
                }
            }
        }
    }

    return maze;
}

function init(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    TILE_SIZE = Math.min(canvas.width / COLS, canvas.height / ROWS);
    grid = generateMaze(COLS, ROWS);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
            if(grid[r][c] === 1){
                ctx.fillStyle = "#111";
                ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            } else {
                ctx.fillStyle = "#eee";
                ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }
}

function loop(){
    draw();
    requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
