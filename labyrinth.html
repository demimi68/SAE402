<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinthe</title>
<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>

<canvas id="Canva-jeu"></canvas>

<script>
// CANVAS
const c = document.querySelector("#Canva-jeu");
const ctx = c.getContext('2d');

let colonne = 17;
let ligne = 23;
let grid = [];
let taille; // taille d'une case en pixels

// --- SPRITE ---
const playerImg = new Image();
playerImg.src = "img/perso.png";

let SPRITE_W, SPRITE_H;
playerImg.onload = () => {
    SPRITE_W = playerImg.width / 4;
    SPRITE_H = playerImg.height / 4;
};

// JOUEUR (en pixels maintenant)
let player = {
    x: 0, // à init plus tard
    y: 0,
    dir: 0,
    frame: 0,
    speed: 2 // pixels par frame
};

// CONTROLES
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// --- LABYRINTHE ---
function generateLaby(col, lig) {
    let laby = Array.from({ length: lig }, () => Array(col).fill(1));

    function creuser(l, c) {
        laby[l][c] = 0;

        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random()-0.5);

        for (let d of dirs) {
            let nl = l + d[0];
            let nc = c + d[1];

            if (nl > 0 && nl < lig-1 && nc > 0 && nc < col-1 && laby[nl][nc] === 1) {
                laby[l + d[0]/2][c + d[1]/2] = 0;
                creuser(nl, nc);
            }
        }
    }

    creuser(1,1);
    return laby;
}

// INIT
function init() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;

    grid = generateLaby(colonne, ligne);

    taille = Math.min(c.width/colonne, c.height/ligne);

    // spawn sûr (en pixels)
    player.x = 1 * taille;
    player.y = 1 * taille;
}

// COLLISION (en pixels)
function peutBouger(x, y) {
    let marge = 2; // pixels

    let points = [
        [x + marge, y + marge],
        [x + taille - marge, y + marge],
        [x + marge, y + taille - marge],
        [x + taille - marge, y + taille - marge]
    ];

    for (let p of points) {
        let col = Math.floor(p[0]/taille);
        let lig = Math.floor(p[1]/taille);

        if (!grid[lig] || grid[lig][col] === 1) {
            return false;
        }
    }

    return true;
}

// UPDATE
function update() {
    let moving = false;

    let nx = player.x;
    let ny = player.y;

    if (keys["ArrowLeft"]) { nx -= player.speed; player.dir = 1; moving = true; }
    if (keys["ArrowRight"]) { nx += player.speed; player.dir = 2; moving = true; }
    if (keys["ArrowUp"]) { ny -= player.speed; player.dir = 3; moving = true; }
    if (keys["ArrowDown"]) { ny += player.speed; player.dir = 0; moving = true; }

    // vérifier collisions
    if (peutBouger(nx, player.y)) player.x = nx;
    if (peutBouger(player.x, ny)) player.y = ny;

    // animation
    if (moving) {
        player.frame += 0.15;
        if (player.frame >= 4) player.frame = 0;
    } else {
        player.frame = 0;
    }
}

// DRAW
function afficher() {
    ctx.clearRect(0,0,c.width,c.height);

    // LABYRINTHE
    for (let l = 0; l < ligne; l++) {
        for (let col = 0; col < colonne; col++) {
            ctx.fillStyle = grid[l][col] === 1 ? "#000" : "#eee";
            ctx.fillRect(col*taille, l*taille, taille, taille);
        }
    }

    // JOUEUR
    if (SPRITE_W && SPRITE_H) {
        let frameX = Math.floor(player.frame) * SPRITE_W;
        let frameY = player.dir * SPRITE_H;

        ctx.drawImage(
            playerImg,
            frameX, frameY, SPRITE_W, SPRITE_H,
            player.x, player.y,
            taille,
            taille
        );
    }
}

// LOOP
function boucle() {
    update();
    afficher();
    requestAnimationFrame(boucle);
}

init();
boucle();
</script>

</body>
</html>
