<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinthe multi-chemins</title>
<style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; background: #eee; }
</style>
</head>
<body>

<canvas id="Canva-jeu"></canvas>

<script>
// --- Initialisations ---
const c = document.querySelector("#Canva-jeu");
const ctx = c.getContext('2d');

let colonne = 17;
let ligne = 23;
let grid = [];

let taille; // taille des cases

// Position du joueur
let player = { x: 1, y: 1 };

// --- Génération labyrinthe multi-chemins ---
function generateLaby(col, lig) {
    let laby = [];
    for (let l = 0; l < lig; l++) {
        laby[l] = [];
        for (let c = 0; c < col; c++) laby[l][c] = 1;
    }

    function creuser(l, c) {
        laby[l][c] = 0;

        let directions = [
            [0, 2], [0, -2], [2, 0], [-2, 0]
        ];
        directions.sort(() => Math.random() - 0.5);

        for (let d of directions) {
            let nl = l + d[0];
            let nc = c + d[1];

            if (nl > 0 && nl < lig - 1 && nc > 0 && nc < col - 1) {
                if (laby[nl][nc] === 1) {
                    laby[l + d[0]/2][c + d[1]/2] = 0;
                    creuser(nl, nc);
                }
            }
        }
    }
    creuser(1, 1);

    // Ajouter des chemins supplémentaires
    let chance = 0.2;
    for (let l = 1; l < lig-1; l++) {
        for (let c = 1; c < col-1; c++) {
            if (laby[l][c] === 1) {
                let voisins = 0;
                if (laby[l+1][c] === 0) voisins++;
                if (laby[l-1][c] === 0) voisins++;
                if (laby[l][c+1] === 0) voisins++;
                if (laby[l][c-1] === 0) voisins++;
                if (voisins >= 2 && Math.random() < chance) laby[l][c] = 0;
            }
        }
    }

    return laby;
}

// --- Initialisation ---
function init() {
    c.height = window.innerHeight;
    c.width = window.innerWidth;
    grid = generateLaby(colonne, ligne);
    taille = Math.min(c.width / colonne, c.height / ligne);
}

// --- Affichage labyrinthe et joueur ---
function afficher() {
    ctx.clearRect(0, 0, c.width, c.height);

    for (let l = 0; l < ligne; l++) {
        for (let c = 0; c < colonne; c++) {
            ctx.fillStyle = grid[l][c] === 1 ? "#000" : "#eee";
            ctx.fillRect(c * taille, l * taille, taille, taille);
        }
    }

    // Dessiner le joueur
    ctx.fillStyle = "red";
    ctx.fillRect(player.x * taille, player.y * taille, taille, taille);
}

// --- Déplacements ---
document.addEventListener('keydown', e => {
    let nx = player.x;
    let ny = player.y;

    if (e.key === "ArrowUp") ny--;
    if (e.key === "ArrowDown") ny++;
    if (e.key === "ArrowLeft") nx--;
    if (e.key === "ArrowRight") nx++;

    // Collision avec mur
    if (grid[ny] && grid[ny][nx] === 0) {
        player.x = nx;
        player.y = ny;
    }
});

// --- Boucle principale ---
function boucle() {
    afficher();
    requestAnimationFrame(boucle);
}

init();
boucle();
</script>

</body>
</html>
