<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guillaume Tell - L'Infiltration Tactique</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px black; }
        #msg { margin: 0; font-size: 18px; color: #66fcf1; transition: color 0.3s, transform 0.1s; }
        .danger { animation: shake 0.3s infinite; color: #ff4d4d !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
        #joystick-zone {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(184, 134, 11, 0.3);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #joystick-knob {
            position: absolute; width: 40px; height: 40px; background: #b8860b;
            border-radius: 50%; left: 30px; top: 30px; box-shadow: 0 0 10px rgba(184, 134, 11, 0.8);
        }
    </style>
</head>
<body>

<div id="ui"><h2 id="msg">Infiltre-toi. Vole le chapeau. Évite les gardes.</h2></div>
<canvas id="gameCanvas"></canvas>
<div id="joystick-zone"><div id="joystick-knob"></div></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const msgDisplay = document.getElementById('msg');

// --- CONFIGURATION ---
const COLS = 17; const ROWS = 23; 
let TILE_SIZE; let grid = [];
let playerLightRadius = 100;
const GUARD_DANGER_RADIUS = 140; // Zone rouge d'avertissement
const GUARD_PATROL_SPEED = 1.0;  // Vitesse calme
const GUARD_CHASE_SPEED = 1.6;   // Vitesse de poursuite (pas trop rapide)

// --- GÉNÉRATION DU LABYRINTHE OUVERT ---
function generateMaze(cols, rows) {
    let maze = Array.from({ length: rows }, () => Array(cols).fill(1));
    function walk(r, c) {
        maze[r][c] = 0;
        const dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].sort(() => Math.random() - 0.5);
        for (let [dr, dc] of dirs) {
            let nr = r + dr, nc = c + dc;
            if (nr > 0 && nr < rows && nc > 0 && nc < cols && maze[nr][nc] === 1) {
                maze[r + dr/2][c + dc/2] = 0; walk(nr, nc);
            }
        }
    }
    walk(1, 1);
    // Casser des murs pour créer des boucles (chemins multiples)
    for (let r = 1; r < rows - 1; r++) {
        for (let c = 1; c < cols - 1; c++) {
            if (maze[r][c] === 1 && Math.random() < 0.28) {
                if ((maze[r][c-1] === 0 && maze[r][c+1] === 0) || (maze[r-1][c] === 0 && maze[r+1][c] === 0)) {
                    maze[r][c] = 0;
                }
            }
        }
    }
    maze[rows-2][cols-2] = 2; // Objectif : Chapeau
    return maze;
}

// --- ENTITÉS & ÉTAT ---
const player = { x: 0, y: 0, r: 10, speed: 2.8, vx: 0, vy: 0 };
let guards = [];
let gameOver = false, victory = false, proximityAlert = false;

function init() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    TILE_SIZE = Math.min(canvas.width / COLS, canvas.height / ROWS);
    grid = generateMaze(COLS, ROWS);
    
    player.x = TILE_SIZE * 1.5; player.y = TILE_SIZE * 1.5;
    playerLightRadius = TILE_SIZE * 2.8;

    // Création de 3 gardes à des endroits opposés
    guards = [
        { x: TILE_SIZE * (COLS-2.5), y: TILE_SIZE * 1.5, r: 10, speed: GUARD_PATROL_SPEED, axis: 'y', dir: 1, timer: 0, state: 'patrol', target: null },
        { x: TILE_SIZE * 1.5, y: TILE_SIZE * (ROWS-2.5), r: 10, speed: GUARD_PATROL_SPEED, axis: 'x', dir: 1, timer: 0, state: 'patrol', target: null },
        { x: TILE_SIZE * (COLS-2.5), y: TILE_SIZE * (ROWS-6.5), r: 10, speed: GUARD_PATROL_SPEED, axis: 'x', dir: -1, timer: 0, state: 'patrol', target: null }
    ];

    gameOver = false; victory = false; proximityAlert = false;
    msgDisplay.innerText = "Trouve le chapeau d'Apple !";
    msgDisplay.className = ""; msgDisplay.style.color = "#66fcf1";
}

// --- CONTRÔLES (TOUCH & CLAVIER CORRECT) ---
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code.includes('Arrow')) e.preventDefault(); });
window.addEventListener('keyup', e => keys[e.code] = false);

const knob = document.getElementById('joystick-knob');
const zone = document.getElementById('joystick-zone');
let activeTouch = false;

zone.addEventListener('touchstart', e => { activeTouch = true; handleStick(e); });
zone.addEventListener('touchmove', e => { if(activeTouch) handleStick(e); });
zone.addEventListener('touchend', () => { activeTouch = false; knob.style.transform = `translate(0,0)`; player.vx = 0; player.vy = 0; });

function handleStick(e) {
    e.preventDefault();
    const t = e.touches[0]; const rect = zone.getBoundingClientRect();
    const dx = t.clientX - (rect.left + rect.width/2); const dy = t.clientY - (rect.top + rect.height/2);
    const dist = Math.min(Math.hypot(dx, dy), 40); const angle = Math.atan2(dy, dx);
    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    player.vx = Math.cos(angle) * player.speed * (dist/40); player.vy = Math.sin(angle) * player.speed * (dist/40);
}

// --- LOGIQUE (COLLISIONS & IA DE POURSUITE) ---
function isWall(x, y, radius = player.r) {
    const margin = radius * 0.7;
    const points = [[x-margin, y-margin], [x+margin, y-margin], [x-margin, y+margin], [x+margin, y+margin]];
    for(let p of points) {
        let gx = Math.floor(p[0]/TILE_SIZE), gy = Math.floor(p[1]/TILE_SIZE);
        if(grid[gy] && grid[gy][gx] === 1) return true;
    }
    return false;
}

// Fonction cruciale : Vérifie si le garde voit le joueur (même couloir sans mur)
function canSeePlayer(g) {
    const dist = Math.hypot(player.x - g.x, player.y - g.y);
    if (dist > 300) return false; // Trop loin pour voir

    // Vérification simplifiée : même ligne ou même colonne avec marge
    const sameRow = Math.abs(g.y - player.y) < TILE_SIZE * 0.4;
    const sameCol = Math.abs(g.x - player.x) < TILE_SIZE * 0.4;

    if (!sameRow && !sameCol) return false;

    // Vérifier les murs entre les deux
    const steps = dist / (TILE_SIZE / 2);
    const dx = (player.x - g.x) / steps;
    const dy = (player.y - g.y) / steps;
    for (let i = 1; i < steps; i++) {
        let gx = Math.floor((g.x + dx * i) / TILE_SIZE);
        let gy = Math.floor((g.y + dy * i) / TILE_SIZE);
        if (grid[gy] && grid[gy][gx] === 1) return false; // Mur détecté
    }
    return true; // Ligne de vue dégagée
}

function update() {
    if(gameOver || victory) return;

    // 1. Mouvement Joueur (Correction des directions)
    if(!activeTouch) {
        let moveX = 0, moveY = 0;
        if (keys.ArrowRight) moveX += 1; if (keys.ArrowLeft) moveX -= 1;
        if (keys.ArrowDown) moveY += 1; if (keys.ArrowUp) moveY -= 1;
        if (moveX !== 0 || moveY !== 0) { const m = Math.hypot(moveX, moveY); player.vx = (moveX/m)*player.speed; player.vy = (moveY/m)*player.speed; }
        else { player.vx = 0; player.vy = 0; }
    }
    if(!isWall(player.x + player.vx, player.y)) player.x += player.vx;
    if(!isWall(player.x, player.y + player.vy)) player.y += player.vy;

    // 2. IA DES GARDES (Poursuite Aléatoire Tactique)
    proximityAlert = false;
    guards.forEach(g => {
        const distToPlayer = Math.hypot(player.x - g.x, player.y - g.y);
        if (distToPlayer < GUARD_DANGER_RADIUS) proximityAlert = true;

        // Mise à jour de l'état (Poursuite ou Patrouille)
        if (canSeePlayer(g)) {
            if (g.state === 'patrol') {
                g.state = 'chase'; g.speed = GUARD_CHASE_SPEED; 
                msgDisplay.innerText = "DÉCOUVERT ! ILS TE SUIVENT !"; msgDisplay.className = "danger";
            }
            g.target = { x: player.x, y: player.y }; // Mémoriser la dernière position vue
            g.timer = 0; // Reset timer de patrouille
        }

        // --- LOGIQUE DE DÉPLACEMENT ---
        if (g.state === 'chase' && g.target) {
            // Chance aléatoire d'abandonner la poursuite (3% par seconde environ)
            if (Math.random() < 0.03) {
                g.state = 'patrol'; g.speed = GUARD_PATROL_SPEED; g.target = null;
                return; // Passer au garde suivant
            }

            // Se diriger vers la dernière position mémorisée du joueur
            const tx = g.target.x; const ty = g.target.y;
            const dx = tx - g.x; const dy = ty - g.y;
            
            // Si on est très proche de la cible mémorisée, on repasse en patrouille (on a perdu le joueur au coin)
            if (Math.hypot(dx, dy) < 15) {
                g.state = 'patrol'; g.speed = GUARD_PATROL_SPEED; g.target = null;
            } else {
                // Avancer tactiquement (privilégier l'axe le plus éloigné)
                if (Math.abs(dx) > Math.abs(dy)) {
                    g.axis = 'x'; g.dir = Math.sign(dx);
                    if (isWall(g.x + g.speed * g.dir, g.y, g.r)) { g.axis = 'y'; g.dir = Math.sign(dy); }
                } else {
                    g.axis = 'y'; g.dir = Math.sign(dy);
                    if (isWall(g.x, g.y + g.speed * g.dir, g.r)) { g.axis = 'x'; g.dir = Math.sign(dx); }
                }
                g.x += (g.axis === 'x' ? g.speed * g.dir : 0);
                g.y += (g.axis === 'y' ? g.speed * g.dir : 0);
            }

        } else {
            // --- PATROUILLE ALÉATOIRE CLASSIQUE ---
            g.state = 'patrol'; g.speed = GUARD_PATROL_SPEED; // Sécurité
            let nx = g.x + (g.axis==='x' ? g.speed*g.dir : 0);
            let ny = g.y + (g.axis==='y' ? g.speed*g.dir : 0);
            g.timer--;
            const wallAhead = isWall(nx + (g.axis==='x'?18*g.dir:0), ny + (g.axis==='y'?18*g.dir:0), g.r);
            if(wallAhead || g.timer <= 0 || Math.random() < 0.01) {
                g.timer = 150 + Math.random() * 250;
                const dirs = [{a:'x',d:1},{a:'x',d:-1},{a:'y',d:1},{a:'y',d:-1}].sort(()=>Math.random()-0.5);
                for(let d of dirs) {
                    if(!isWall(g.x+(d.a==='x'?25*d.d:0), g.y+(d.a==='y'?25*d.d:0), g.r)) {
                        g.axis = d.a; g.dir = d.d; break;
                    }
                }
            } else { g.x = nx; g.y = ny; }
        }

        // Collision fatale
        if(distToPlayer < (player.r + g.r)) { gameOver = true; }
    });

    // 3. UI FINALE
    if(gameOver) { msgDisplay.innerText = "CAPTURÉ ! Rejouer ?"; msgDisplay.className = ""; msgDisplay.style.color = "#ff4d4d"; }
    else if(grid[Math.floor(player.y/TILE_SIZE)][Math.floor(player.x/TILE_SIZE)] === 2) { victory = true; msgDisplay.innerText = "CHAPEAU VOLÉ ! BRAVO !"; msgDisplay.className = ""; msgDisplay.style.color = "gold"; }
    else if(proximityAlert && msgDisplay.className !== "danger") { msgDisplay.innerText = "ATTENTION : Garde proche !"; msgDisplay.style.color = "#ff8000"; }
    else if(!proximityAlert && msgDisplay.className !== "danger") { msgDisplay.innerText = "Trouve le chapeau d'Apple !"; msgDisplay.style.color = "#66fcf1"; }
}

// --- RENDU (CANVAS DOUBLE PASSE) ---
function draw() {
    ctx.fillStyle = "#050508"; ctx.fillRect(0,0,canvas.width,canvas.height);

    // --- PASSE 1 : Le monde ---
    ctx.save();
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            if(grid[r][c] === 1) { ctx.fillStyle = "#111418"; ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
            else if(grid[r][c] === 2) { 
                ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c*TILE_SIZE+TILE_SIZE/2, r*TILE_SIZE+TILE_SIZE/2, 10, 0, 7); 
                ctx.shadowBlur = 20; ctx.shadowColor = "gold"; ctx.fill(); ctx.shadowBlur = 0;
            }
        }
    }
    guards.forEach(g => { 
        ctx.fillStyle = (g.state === 'chase' ? "#ff0000" : "#cc3333"); 
        ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, 7); ctx.fill(); 
        if(g.state === 'chase') { ctx.shadowBlur = 10; ctx.shadowColor = "red"; ctx.stroke(); ctx.shadowBlur = 0; }
    });
    ctx.fillStyle = "#66fcf1"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, 7); ctx.fill();
    ctx.restore();

    // --- PASSE 2 : Obscurité et Danger ---
    const tCanvas = document.createElement('canvas'); tCanvas.width = canvas.width; tCanvas.height = canvas.height;
    const tctx = tCanvas.getContext('2d');
    tctx.fillStyle = "black"; tctx.fillRect(0,0,canvas.width,canvas.height);
    tctx.globalCompositeOperation = 'destination-out';
    let pGrad = tctx.createRadialGradient(player.x, player.y, playerLightRadius*0.1, player.x, player.y, playerLightRadius);
    pGrad.addColorStop(0, 'rgba(255,255,255,1)'); pGrad.addColorStop(1, 'rgba(255,255,255,0)');
    tctx.fillStyle = pGrad; tctx.beginPath(); tctx.arc(player.x, player.y, playerLightRadius, 0, 7); tctx.fill();
    tctx.globalCompositeOperation = 'source-over';
    guards.forEach(g => {
        let dist = Math.hypot(player.x - g.x, player.y - g.y);
        let dangerRadius = (g.state === 'chase' ? GUARD_DANGER_RADIUS * 1.3 : GUARD_DANGER_RADIUS);
        if (dist < dangerRadius + playerLightRadius) {
            let gGrad = tctx.createRadialGradient(g.x, g.y, 10, g.x, g.y, dangerRadius);
            gGrad.addColorStop(0, g.state === 'chase' ? 'rgba(255, 0, 0, 0.6)' : 'rgba(255, 0, 0, 0.3)');
            gGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');
            tctx.fillStyle = gGrad; tctx.beginPath(); tctx.arc(g.x, g.y, dangerRadius, 0, 7); tctx.fill();
        }
    });
    ctx.globalCompositeOperation = 'multiply'; ctx.drawImage(tCanvas, 0, 0); ctx.globalCompositeOperation = 'source-over';
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('mousedown', () => { if(gameOver || victory) init(); });
window.addEventListener('touchstart', (e) => { if(gameOver || victory) init(); else if(e.target.id === 'gameCanvas') e.preventDefault(); }, {passive:false});
init(); loop();
</script>
</body>
</html>
