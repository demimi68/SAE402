<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAE402</title>
    <link rel="stylesheet" href="style/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <!-- Overlay -->
    <div id="overlay"
        style="display:flex; justify-content:center; align-items:center; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10; flex-direction:column;">

        <!-- ===== MENU DE DEBUT ===== -->
        <div id="menu">
            <h1>Labyrinthe</h1>

            <!-- Règles du jeu -->
            <p>Règles : Attrape le chapeau et évite les ennemis !</p>

            <!-- Bouton pour démarrer le jeu -->
            <button id="startBtn">Lancer le jeu</button>
        </div>

        <!-- ===== ECRAN DE FIN ===== -->
        <div id="endScreen" style="display:none; text-align:center; color:#fff;">

            <!-- Message (gagné / perdu) -->
            <h1 id="endMessage"></h1>

            <!-- Bouton rejouer -->
            <button id="restartBtn">Rejouer</button>

            <!-- Bouton continuer -->
            <a id="continueBtn" href="#" style="display:none; text-decoration:none;">
                <button>Continuer</button>
            </a>
        </div>
    </div>

    <!-- Zone où le jeu est dessiné -->
    <canvas id="Canva-jeu"></canvas>

    <!-- Zone tactile -->
    <div id="joystick">
        <div id="stick"></div>
    </div>


    <!-- SCRIPT JS -->
    <script src="js/script.js"></script>
</body>

</html>
