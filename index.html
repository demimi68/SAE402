<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu SAE-402</title>

<style>
body {
    background: #d7d7d7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

#maze {
    display: grid;
}

.wall { background: black; }
.path { background: white; }
.player { background: red; }
.goal { background: gold; }

</style>
</head>

<body>

<div id="maze"></div>

<script>

// 🔥 moins de cases = plus grandes
const size = 25;

// 🔥 taille écran
const screenWidth = window.innerWidth;
const screenHeight = window.innerHeight;

// 🔥 calcul taille case
const cellSize = Math.floor(
    Math.min(screenWidth, screenHeight) / size
);

let maze = Array.from({ length: size }, () =>
    Array(size).fill(1)
);

// DFS
function carve(x, y) {
    const dirs = [[2,0],[-2,0],[0,2],[0,-2]]
        .sort(() => Math.random() - 0.5);

    for (let [dx, dy] of dirs) {
        let nx = x + dx;
        let ny = y + dy;

        if (
            nx > 0 && nx < size-1 &&
            ny > 0 && ny < size-1 &&
            maze[ny][nx] === 1
        ) {
            maze[ny][nx] = 0;
            maze[y + dy/2][x + dx/2] = 0;
            carve(nx, ny);
        }
    }
}

// connexions
function addConnections(p = 0.2) {
    for (let y = 2; y < size-2; y++) {
        for (let x = 2; x < size-2; x++) {

            if (maze[y][x] === 1 && Math.random() < p) {

                if (maze[y][x-1] === 0 && maze[y][x+1] === 0)
                    maze[y][x] = 0;

                else if (maze[y-1][x] === 0 && maze[y+1][x] === 0)
                    maze[y][x] = 0;
            }
        }
    }
}

// centre
function openCenter() {
    let c = Math.floor(size / 2);

    maze[c][c] = 0;
    maze[c+1][c] = 0;
    maze[c-1][c] = 0;
    maze[c][c+1] = 0;
    maze[c][c-1] = 0;
}

// spawn
function getRandomSpawn() {
    const positions = [
        [1,1],
        [1,size-2],
        [size-2,1],
        [size-2,size-2]
    ];
    return positions[Math.floor(Math.random()*4)];
}

// génération
maze[1][1] = 0;
carve(1,1);
addConnections(0.2);
openCenter();

let [playerX, playerY] = getRandomSpawn();
maze[playerY][playerX] = 0;

const goal = [Math.floor(size/2), Math.floor(size/2)];

const container = document.getElementById("maze");

// affichage
function draw() {
    container.innerHTML = "";

    container.style.gridTemplateColumns =
        `repeat(${size}, ${cellSize}px)`;

    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {

            const div = document.createElement("div");

            div.style.width = cellSize + "px";
            div.style.height = cellSize + "px";

            if (x === playerX && y === playerY)
                div.className = "player";
            else if (x === goal[0] && y === goal[1])
                div.className = "goal";
            else
                div.className = maze[y][x] ? "wall" : "path";

            container.appendChild(div);
        }
    }
}

draw();

</script>

</body>
</html>
